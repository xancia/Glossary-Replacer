<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glossary Replacer</title>
    <style>
      body {
        margin: 0;
        padding: 14px;
        min-width: 260px;
        font-family: "Segoe UI", Tahoma, sans-serif;
        color: #1b2435;
        background: #f5f7fb;
      }
      .card {
        background: #fff;
        border: 1px solid #dce3ef;
        border-radius: 10px;
        padding: 12px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 16px;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 8px 0;
      }
      .stats {
        font-size: 12px;
        color: #53617e;
      }
      button {
        margin-top: 8px;
        width: 100%;
        border: 1px solid #c7d3e8;
        border-radius: 8px;
        padding: 7px 10px;
        background: #ffffff;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Glossary Replacer</h1>
      <label class="row">
        <input id="enabled" type="checkbox" />
        Enable replacement
      </label>
      <div class="stats" id="stats">Rules: 0</div>
      <button id="openOptionsBtn">Open settings</button>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
